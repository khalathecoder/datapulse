<!--
  Wazuh Agent — localfile config for DataPulse
  ════════════════════════════════════════════════════════════════════════════
  This snippet tells the Wazuh agent to watch the DataPulse log file.

  WHERE TO ADD THIS on your Ubuntu Wazuh server:
    Open:  /var/ossec/etc/ossec.conf
    Paste this block inside the existing <ossec_config> tags.
    Then restart the agent:  sudo systemctl restart wazuh-agent

  HOW localfile WORKS:
    The Wazuh agent "tails" this file just like `tail -f` in a terminal.
    Every new line written to the file is immediately read, decoded,
    and sent to the Wazuh manager for rule matching.
    <log_format>json</log_format> tells it each line is a JSON object,
    so it automatically extracts fields like "severity", "company", etc.
    without needing a custom regex decoder.

  PATH NOTES:
    If DataPulse is running on Windows, change the path to the Windows path:
      <location>C:\Scripts\DataPulse\logs\datapulse_wazuh.log</location>
    If using a VirtualBox shared folder to share the log with the Ubuntu VM:
      <location>/mnt/datapulse_share/logs/datapulse_wazuh.log</location>
    If DataPulse is running directly on Ubuntu:
      <location>/opt/datapulse/logs/datapulse_wazuh.log</location>
-->

<ossec_config>

  <localfile>
    <!--
      The full path to the log file DataPulse writes.
      Adjust this to match where DataPulse is running.
    -->
    <location>/opt/datapulse/logs/datapulse_wazuh.log</location>

    <!--
      json format tells Wazuh to parse each line as JSON automatically.
      Fields like "severity", "company", "category" become searchable
      in the dashboard without any additional decoder configuration.
    -->
    <log_format>json</log_format>

    <!--
      label adds metadata to every event from this file.
      Useful for filtering "all events from DataPulse" in the dashboard.
    -->
    <label key="app">datapulse</label>
  </localfile>

</ossec_config>
